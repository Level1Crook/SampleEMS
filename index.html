<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>uConnect EMS - Login</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header>
    <div class="logo">
      <!-- Replace src with your actual logo path if needed -->
      <img src="logo.png" alt="uConnect Logo" class="logo-img">
      <h1>uConnect Employee Management</h1>
    </div>
    <div class="user-info">
      <!-- Empty on login page -->
    </div>
  </header>

  <div class="main-container">
    <div class="login-container">
      <h2>Login</h2>
      <p style="font-size:12px;color:#555;margin-bottom:15px;">
        Demo credentials:<br>
        employee1 / password (Employee)<br>
        supervisor1 / password (Supervisor)<br>
        hr1 / password (HR)
      </p>
      <form id="loginForm">
        <div class="form-group">
          <label for="username">Username</label>
          <input id="username" type="text" required>
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input id="password" type="password" required>
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%;">Login</button>
      </form>
      <p id="loginError" style="color:#e74c3c;font-size:13px;margin-top:10px;display:none;">
        Invalid username or password.
      </p>
    </div>
  </div>

  <script src="app.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const form = document.getElementById('loginForm');
      const errorEl = document.getElementById('loginError');

      form.addEventListener('submit', e => {
        e.preventDefault();
        const username = document.getElementById('username').value.trim();
        const password = document.getElementById('password').value;

        const user = login(username, password);
        if (!user) {
          errorEl.style.display = 'block';
        } else {
          errorEl.style.display = 'none';
          // redirect to dashboard
          window.location.href = 'dashboard.html';
        }
      });

      // If already logged in, skip login
      const existingUser = getCurrentUser();
      if (existingUser) {
        window.location.href = 'dashboard.html';
      }
    });
  </script>
</body>
</html>
